<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stefano Blando</title>
    <meta name="robots" content="noindex">
    <script>
      (function () {
        var supported = ['en', 'it'];
        var fallback = 'en';

        function normalize(value) {
          if (!value) return '';
          return String(value).toLowerCase().split('-')[0];
        }

        var stored = '';
        try {
          stored = normalize(localStorage.getItem('preferred-language'));
        } catch (e) {}

        var detected = normalize(navigator.language || navigator.userLanguage || fallback);
        var target = supported.indexOf(stored) !== -1 ? stored : (supported.indexOf(detected) !== -1 ? detected : fallback);

        window.location.replace('/' + target + '/');
      })();
    </script>
    <noscript>
      <meta http-equiv="refresh" content="0; url=/en/">
    </noscript>
  </head>
  <body></body>
</html>
