<!-- Particle Background (Network/Constellation) -->
<div id="tsparticles" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;"></div>

<!-- Load tsParticles from CDN -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@3.5.0/tsparticles.bundle.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    if (window.tsParticles) {
        tsParticles.load({
            id: "tsparticles",
            options: {
                background: {
                    color: {
                        value: "transparent"
                    }
                },
                fpsLimit: 60,
                interactivity: {
                    events: {
                        onHover: {
                            enable: true,
                            mode: "grab"
                        }
                    },
                    modes: {
                        grab: {
                            distance: 140,
                            links: {
                                opacity: 0.5
                            }
                        }
                    }
                },
                particles: {
                    color: {
                        value: "#60a5fa" /* light blue */
                    },
                    links: {
                        color: "#3b82f6", /* blue */
                        distance: 150,
                        enable: true,
                        opacity: 0.3,
                        width: 1
                    },
                    move: {
                        direction: "none",
                        enable: true,
                        outModes: {
                            default: "bounce"
                        },
                        random: false,
                        speed: 0.8,
                        straight: false
                    },
                    number: {
                        density: {
                            enable: true,
                            area: 800
                        },
                        value: 50 /* not too many to avoid clutter */
                    },
                    opacity: {
                        value: 0.5
                    },
                    shape: {
                        type: "circle"
                    },
                    size: {
                        value: { min: 1, max: 3 }
                    }
                },
                detectRetina: true
            }
        });
    }
});
</script>
