<!-- Particle Background (Network/Constellation) -->
<div id="tsparticles" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none;"></div>

<!-- Load tsParticles from CDN -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@3.5.0/tsparticles.bundle.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    if (window.tsParticles) {
        tsParticles.load({
            id: "tsparticles",
            options: {
                background: {
                    color: {
                        value: "transparent"
                    }
                },
                fpsLimit: 60,
                interactivity: {
                    events: {
                        onHover: {
                            enable: true,
                            mode: "grab"
                        }
                    },
                    modes: {
                        grab: {
                            distance: 140,
                            links: {
                                opacity: 0.5
                            }
                        }
                    }
                },
                particles: {
                    color: {
                        value: "#ffffff" /* bright white */
                    },
                    links: {
                        color: "#93c5fd", /* bright light blue */
                        distance: 150,
                        enable: true,
                        opacity: 0.6,
                        width: 1.5
                    },
                    move: {
                        direction: "none",
                        enable: true,
                        outModes: {
                            default: "bounce"
                        },
                        random: false,
                        speed: 1.5,
                        straight: false
                    },
                    number: {
                        density: {
                            enable: true,
                            area: 800
                        },
                        value: 70 /* more particles */
                    },
                    opacity: {
                        value: 0.8
                    },
                    shape: {
                        type: "circle"
                    },
                    size: {
                        value: { min: 1, max: 3 }
                    }
                },
                detectRetina: true
            }
        });
    }
});
</script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    // Select elements that we want to animate on scroll
    const elementsToAnimate = document.querySelectorAll('.feature-card, .card, section h2, section h3');
    
    // Add the base .reveal class to them immediately
    elementsToAnimate.forEach(el => {
        el.classList.add('reveal');
    });

    const revealCallback = function(entries, observer) {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
                // Optional: Stop observing once revealed so it doesn't animate out and in repeatedly
                // observer.unobserve(entry.target); 
            }
        });
    };

    const revealOptions = {
        threshold: 0.1, // Trigger when 10% of the element is visible
        rootMargin: "0px 0px -50px 0px"
    };

    const revealObserver = new IntersectionObserver(revealCallback, revealOptions);

    elementsToAnimate.forEach(el => {
        revealObserver.observe(el);
    });
});
</script>
